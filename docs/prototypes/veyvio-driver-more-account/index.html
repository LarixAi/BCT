<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Veyvio Driver — More & Account</title>
<style>
:root{--midnight:#0B1526;--blue:#2F6BFF;--soft:#EFF6FF;--page:#F3F4F6;--ink:#111827;--muted:#6B7280;--border:#E5E7EB;--ok:#178C4B;--warn:#D97706;--red:#D92D20}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;background:#EEF2F6;color:var(--ink);display:grid;place-items:center;padding:24px}button{font:inherit}
.phone{position:relative;width:min(390px,100%);height:844px;overflow:hidden;border:10px solid #111827;border-radius:42px;background:var(--page);box-shadow:0 28px 80px rgba(11,21,38,.28)}
.page{position:absolute;inset:0;transition:.25s ease}.off{transform:translateX(100%);pointer-events:none}.left{transform:translateX(-12%);opacity:0;pointer-events:none}
.scroll{height:100%;overflow:auto}.more-h{background:#fff;padding:24px 20px 18px;border-bottom:1px solid var(--border)}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top h1{margin:0;font-size:34px;letter-spacing:-.045em}
.round{width:48px;height:48px;border:0;border-radius:999px;background:#F3F4F6}
.profile{width:100%;border:0;background:transparent;display:grid;grid-template-columns:72px 1fr auto;gap:15px;align-items:center;text-align:left}
.avatar{width:72px;height:72px;border-radius:999px;background:var(--midnight);color:#fff;display:grid;place-items:center;font-weight:850;font-size:22px}
.profile h2{margin:0;font-size:23px}.profile p{margin:5px 0 0;color:var(--muted);font-size:13px;line-height:1.35}.chev{font-size:30px;color:#9CA3AF}
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}.quick button{min-height:100px;border:0;border-radius:16px;background:#F3F4F6;padding:12px;text-align:left}.quick strong,.quick span{display:block}.quick span{font-size:11px;color:var(--muted);margin-top:4px}
.label{padding:16px 20px 8px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:850}
.menu{background:#fff;border-block:1px solid var(--border)}.row{width:100%;min-height:72px;border:0;border-bottom:1px solid var(--border);background:#fff;padding:12px 20px;display:grid;grid-template-columns:44px 1fr auto;gap:14px;align-items:center;text-align:left}.row:last-child{border:0}
.ricon{width:42px;height:42px;border-radius:999px;background:#F3F4F6;display:grid;place-items:center}.copy strong,.copy span{display:block}.copy span{font-size:12px;color:var(--muted);margin-top:4px}
.badge{min-width:23px;height:23px;padding:0 7px;border-radius:999px;background:#FFF1DB;color:var(--warn);display:grid;place-items:center;font-size:11px;font-weight:850}
.signout{width:calc(100% - 40px);margin:22px 20px;min-height:52px;border:0;border-radius:14px;background:#fff;color:var(--red);font-weight:800}
.nav{position:absolute;left:0;right:0;bottom:0;border-top:1px solid var(--border);background:rgba(255,255,255,.97);display:grid;grid-template-columns:repeat(5,1fr);padding:7px 8px 12px}.tab{min-height:56px;border:0;background:transparent;color:var(--muted);font-size:11px}.tab.active{color:var(--blue)}
.acct-h{height:92px;background:#080808;color:#fff;display:grid;grid-template-columns:54px 1fr 54px;align-items:end;padding:0 12px 16px}.back{border:0;background:transparent;color:inherit;font-size:32px}.acct-h h1{margin:0;text-align:center;font-size:21px}
.acct-body{height:calc(100% - 92px);overflow:auto;background:#F4F4F4}.ap{background:#fff;padding:22px 20px;display:grid;grid-template-columns:62px 1fr auto;gap:14px;align-items:center;border-bottom:8px solid #F4F4F4;width:100%;border-left:0;border-right:0;border-top:0;text-align:left}
.block{background:#fff;margin-bottom:8px;border-block:1px solid #E5E5E5}.arow{width:100%;min-height:76px;border:0;border-bottom:1px solid #ECECEC;background:#fff;padding:11px 20px;display:grid;grid-template-columns:48px 1fr auto;gap:13px;align-items:center;text-align:left}.status{font-size:11px;font-weight:800;color:var(--ok)}.status.warn{color:var(--warn)}
.note{padding:14px 20px;background:#fff;color:var(--muted);font-size:12px;line-height:1.45}
</style>
</head>
<body>
<main class="phone">
<section class="page" id="more">
<div class="scroll" style="padding-bottom:90px">
<header class="more-h">
<div class="top"><h1>More</h1><button class="round" type="button">?</button></div>
<button class="profile" type="button" id="openAccount"><span class="avatar">AJ</span><span><h2>Alex Johnson</h2><p>Approved PSV driver<br>Brent Community Transport</p></span><span class="chev">›</span></button>
<div class="quick">
<button type="button"><strong>Documents</strong><span>2 need attention</span></button>
<button type="button"><strong>Sync</strong><span>Up to date</span></button>
<button type="button"><strong>Support</strong><span>Contact Operations</span></button>
</div>
</header>
<p class="label">Driver</p>
<div class="menu">
<button class="row" type="button" id="openAccount2"><span class="ricon">●</span><span class="copy"><strong>Account</strong><span>Profile, company, documents and security</span></span><span class="chev">›</span></button>
<button class="row" type="button"><span class="ricon">✓</span><span class="copy"><strong>Driver declarations</strong><span>Medical, fitness and policy</span></span><span class="badge">1</span></button>
<button class="row" type="button"><span class="ricon">◇</span><span class="copy"><strong>Training</strong><span>Qualifications and refreshers</span></span><span class="chev">›</span></button>
</div>
<p class="label">App</p>
<div class="menu">
<button class="row" type="button"><span class="ricon">☷</span><span class="copy"><strong>App settings</strong><span>Notifications, accessibility and driving mode</span></span><span class="chev">›</span></button>
<button class="row" type="button"><span class="ricon">↻</span><span class="copy"><strong>Offline data and sync</strong><span>Downloaded duties and pending changes</span></span><span>Synced ›</span></button>
</div>
<p class="label">Help</p>
<div class="menu">
<button class="row" type="button"><span class="ricon">◌</span><span class="copy"><strong>Contact Operations</strong><span>Duty, passenger, route and vehicle support</span></span><span class="chev">›</span></button>
<button class="row" type="button"><span class="ricon">?</span><span class="copy"><strong>Help centre</strong><span>Driver guides</span></span><span class="chev">›</span></button>
<button class="row" type="button"><span class="ricon">§</span><span class="copy"><strong>Privacy and legal</strong><span>Policies and terms</span></span><span class="chev">›</span></button>
</div>
<button class="signout" type="button">Sign out</button>
</div>
<nav class="nav" aria-label="Main navigation">
<button class="tab" type="button">Home</button>
<button class="tab" type="button">Duties</button>
<button class="tab" type="button">Checks</button>
<button class="tab" type="button">Messages</button>
<button class="tab active" type="button">More</button>
</nav>
</section>
<section class="page off" id="account">
<header class="acct-h"><button class="back" type="button" id="backMore">‹</button><h1>Account</h1><span></span></header>
<div class="acct-body">
<button class="ap" type="button"><span class="avatar" style="width:62px;height:62px;font-size:20px">AJ</span><span><strong style="font-size:19px">Alex Johnson</strong><span style="display:block;margin-top:4px;font-size:12px;color:var(--muted)">Driver ID DRV-104 · Approved</span></span><span class="chev">›</span></button>
<div class="block">
<button class="arow" type="button"><span class="ricon">●</span><span class="copy"><strong>Personal information</strong><span>Name, phone, email and emergency contact</span></span><span class="chev">›</span></button>
<button class="arow" type="button"><span class="ricon">▦</span><span class="copy"><strong>Company and depot</strong><span>Brent Community Transport · Wembley</span></span><span class="chev">›</span></button>
</div>
<div class="block">
<button class="arow" type="button"><span class="ricon">▤</span><span class="copy"><strong>Licences and documents</strong><span>Driving licence, DBS, CPC</span></span><span class="status warn">2 due ›</span></button>
<button class="arow" type="button"><span class="ricon">◇</span><span class="copy"><strong>Training and qualifications</strong><span>Safeguarding and CPC</span></span><span class="status">Current ›</span></button>
<button class="arow" type="button"><span class="ricon">✓</span><span class="copy"><strong>Driver declarations</strong><span>Medical and policy</span></span><span class="status warn">1 due ›</span></button>
</div>
<div class="block">
<button class="arow" type="button"><span class="ricon">▣</span><span class="copy"><strong>Security</strong><span>Password, biometrics and devices</span></span><span class="status">Enabled ›</span></button>
<button class="arow" type="button"><span class="ricon">◈</span><span class="copy"><strong>Privacy and data</strong><span>Permissions and retention</span></span><span class="chev">›</span></button>
</div>
<p class="note">Operational identity and compliance changes may require review by authorised company staff before they become active.</p>
</div>
</section>
</main>
<script>
const more=document.getElementById('more'),account=document.getElementById('account');
function showMore(){more.className='page';account.className='page off'}
function showAccount(){more.className='page left';account.className='page'}
document.getElementById('openAccount').onclick=showAccount;
document.getElementById('openAccount2').onclick=showAccount;
document.getElementById('backMore').onclick=showMore;
</script>
</body>
</html>
