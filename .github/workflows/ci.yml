name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  yard:
    name: Yard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  admin:
    name: Admin
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Folder name includes a trailing space. Actions trims defaults.run.working-directory,
    # so every step cd's explicitly instead.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ format('{0} /package-lock.json', 'Veyvio admin') }}

      - name: Install
        run: |
          cd "Veyvio admin "
          npm ci

      - name: Lint
        run: |
          cd "Veyvio admin "
          npm run lint

      - name: Unit tests
        run: |
          cd "Veyvio admin "
          npm test

      - name: Build
        env:
          VITE_MOCK_API: "true"
        run: |
          cd "Veyvio admin "
          npm run build

  driver:
    name: Driver
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: veyvio-driver-App
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: veyvio-driver-App/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-anon-key
          VITE_COMMAND_API_BASE_URL: https://example.supabase.co/functions/v1/command-api
          VITE_AUTH_API_BASE_URL: https://example.supabase.co/functions/v1/command-api
          VITE_DRIVER_APP_URL: https://localhost
          VITE_DRIVER_NAV_TEST_MODE: "true"
        run: npm run build

  tenant-isolation:
    name: Tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Requires repo secrets against hosted Command API (see docs/plan/veyvio-multi-tenant-saas-roadmap.md).
    # Fork PRs without secrets fail closed when CI=true and VEYVIO_ANON_KEY is unset.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ format('{0} /package-lock.json', 'Veyvio admin') }}

      - name: Install Admin deps
        run: |
          cd "Veyvio admin "
          npm ci

      - name: Cross-tenant isolation smoke
        env:
          CI: "true"
          VEYVIO_ANON_KEY: ${{ secrets.VEYVIO_ANON_KEY }}
          VEYVIO_API_URL: ${{ secrets.VEYVIO_API_URL }}
          VEYVIO_SUPABASE_URL: ${{ secrets.VEYVIO_SUPABASE_URL }}
          VEYVIO_PLATFORM_EMAIL: ${{ secrets.VEYVIO_PLATFORM_EMAIL }}
          VEYVIO_PLATFORM_PASSWORD: ${{ secrets.VEYVIO_PLATFORM_PASSWORD }}
          VEYVIO_ISOLATION_PASSWORD: ${{ secrets.VEYVIO_ISOLATION_PASSWORD }}
        run: |
          cd "Veyvio admin "
          npm run test:tenant-isolation
